    description: "Prepares music track data for genre classification. Cleans raw CSVs,\
      \ encodes categorical features (explicit, tempo binning), creates interactions\
      \ (energy\xD7loudness, danceability\xD7valence), applies log-transforms to skewed\
      \ features, imputes missing values with median, stratifies 80/20 split, and\
      \ scales with StandardScaler\u2014all while preventing data leakage by fitting\
      \ transformations on training data only."
